# Experimental arms: model + floop configuration
# Model strings use litellm format: "provider/model-name"
# See https://docs.litellm.ai/docs/providers for all supported providers

# --- Gemini arms (active) ---

[arms.gemini_pro_bare]
agent = "mini_swe"
model = "gemini/gemini-2.5-pro"
floop = false
description = "Gemini 2.5 Pro without floop — performance ceiling"

[arms.gemini_flash_bare]
agent = "mini_swe"
model = "gemini/gemini-2.5-flash"
floop = false
description = "Gemini 2.5 Flash without floop — performance floor"

[arms.gemini_flash_floop]
agent = "mini_swe"
model = "gemini/gemini-2.5-flash"
floop = true
floop_store = "behaviors/store"
description = "Gemini 2.5 Flash with floop behaviors"

# --- Run 8: diagnostic arms ---

[arms.flash_placebo]
agent = "mini_swe"
model = "gemini/gemini-2.5-flash"
floop = false
floop_context_override = "placebo"
description = "Flash with placebo prompt text (control for prompt length)"

[arms.flash_floop_3]
agent = "mini_swe"
model = "gemini/gemini-2.5-flash"
floop = false
floop_context_override = "top3"
description = "Flash with 3 focused behaviors, no cadence"

[arms.pro_floop_3]
agent = "mini_swe"
model = "gemini/gemini-2.5-pro"
floop = false
floop_context_override = "top3"
description = "Pro with 3 focused behaviors, no cadence"

# --- Anthropic arms ---

[arms.haiku_bare]
agent = "mini_swe"
model = "anthropic/claude-haiku-4-5-20251001"
floop = false
description = "Haiku without floop — performance floor"

[arms.haiku_floop]
agent = "mini_swe"
model = "anthropic/claude-haiku-4-5-20251001"
floop = true
floop_store = "behaviors/store"
description = "Haiku with trained floop behaviors"

