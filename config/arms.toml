# Experimental arms: model + floop configuration
# Model strings use litellm format: "provider/model-name"
# See https://docs.litellm.ai/docs/providers for all supported providers

# --- Gemini arms (active) ---

[arms.gemini_pro_bare]
agent = "mini_swe"
model = "gemini/gemini-3.1-pro-preview"
floop = false
description = "Gemini 3.1 Pro without floop — performance ceiling"

[arms.gemini_flash_bare]
agent = "mini_swe"
model = "gemini/gemini-3-flash-preview"
floop = false
description = "Gemini 3 Flash without floop — performance floor"

[arms.gemini_flash_floop]
agent = "mini_swe"
model = "gemini/gemini-3-flash-preview"
floop = true
floop_store = "behaviors/store"
description = "Gemini 3 Flash with floop behaviors"

