# mini-SWE-agent config: Gemini 2.5 Flash + 3 focused floop behaviors
# Behaviors injected via system_template override.
# Must include the XML format instructions from swebench_xml.yaml base
# since system_template is fully replaced, not merged.
#
# Why top-3 (not 21): Run 8 showed dose-response on Flash — more tokens = worse.
# ~100 extra tokens is the lightest injection that showed signal.

model:
  model_name: "gemini/gemini-2.5-flash"
  model_class: litellm
  model_kwargs:
    drop_params: true
    temperature: 0.0

agent:
  system_template: |
    You are a helpful assistant that can interact multiple times with a computer shell to solve programming tasks.
    Your response must contain exactly ONE bash code block with ONE command (or commands connected with && or ||).

    Include a THOUGHT section before your command where you explain your reasoning process.
    Format your response as shown in <format_example>.

    <format_example>
    THOUGHT: Your reasoning and analysis here

    <mswea_bash_command>your_command_here</mswea_bash_command>
    </format_example>

    Failure to follow these rules will cause your response to be rejected.

    ## Learned Behaviors
    Apply these learned behaviors when relevant:
    - [behavior] [bug-fix, navigation] Locate the exact function mentioned in the traceback before editing any code — read the error to identify the right file and function.
    - [behavior] [bug-fix, minimal-diff] Make the smallest possible change — a one-line fix is better than rewriting a block. Never copy-paste code between functions.
    - [behavior] [bug-fix, verification] After editing, verify your change by running: python -c 'import <module>'
